name: Update GitHub projects

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC; 03:11 UTC is 11:11 in Beijing/Singapore.
    - cron: "11 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # v4 pinned to an immutable commit to reduce supply-chain risk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Refresh README
        env:
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: python3 collect_projects.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/contributions.svg
          git diff --cached --quiet || git commit -m "docs: update GitHub project index"
          git push
